<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>外部弹幕加载器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>📺 弹幕加载器</h1>
    <p class="subtitle">支持 XML / ASS / JSON 格式</p>

    <div class="status" id="status">等待操作...</div>

    <div class="file-section">
      <label for="danmakuFile" class="file-label">
        <span class="file-icon">📁</span>
        <span class="file-text">选择弹幕文件</span>
      </label>
      <input type="file" id="danmakuFile" accept=".xml,.ass,.ssa,.json,.txt">
      <div class="file-name" id="fileName">未选择文件</div>
    </div>

    <div class="options">
      <div class="option-row">
        <label for="offsetTime">时间偏移 (秒)</label>
        <input type="number" id="offsetTime" value="0" step="0.1">
      </div>
    </div>

    <div class="btn-group">
      <button id="loadBtn" class="btn btn-primary" disabled>
        🚀 加载弹幕
      </button>
      <button id="clearBtn" class="btn btn-secondary">
        🗑️ 清空弹幕
      </button>
    </div>

    <div class="tips">
      <p>💡 <strong>提示：</strong></p>
      <ul>
        <li>B站原生弹幕格式为 XML</li>
        <li>ASS 字幕格式会自动转换</li>
        <li>时间偏移可校准弹幕同步</li>
      </ul>
    </div>
  </div>

  <script src="src/danmaku-parser.js"></script>
  <script src="popup.js"></script>
</body>
</html>
